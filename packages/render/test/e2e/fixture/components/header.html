<!-- Preloaded component: exercises x-colors, locale toggle, and baked $x text -->
<header>
    <span id="greeting" x-text="$x.content.greeting">Hello</span>
    <button id="theme-light" x-colors="'light'" :class="{ 'active': $colors.current === 'light' }">Light</button>
    <button id="theme-dark" x-colors="'dark'" :class="{ 'active': $colors.current === 'dark' }">Dark</button>
    <button id="theme-system" x-colors="'system'" :class="{ 'active': $colors.current === 'system' }">System</button>
    <button id="locale-en" @click="$locale.set('en')">EN</button>
    <button id="locale-fr" @click="$locale.set('fr')">FR</button>
</header>
