# Colorpicker library — English.
# Registered in manifest.json as:
#   "data": { "colors": { "en": "...", "fr": "..." } }
#   "colorpicker": "colors"
#
# IMPORTANT: Across per-locale files, object KEYS must be IDENTICAL. Only VALUES
# translate. Use `_group` / `_name` meta keys to localize visible group and palette
# names — the plain keys stay stable across locales so the data plugin can merge
# and swap cleanly.
#
# Optional reserved top-level keys (commented out below):
#   _tailwind  → replaces the built-in Tailwind group entirely (all-or-nothing)
#   _ios       → replaces the built-in iOS group entirely (all-or-nothing)
# Anything else at the top level = a custom group appended AFTER the built-ins.
#
# This test file only defines a custom "Brand" group so the full built-in
# Tailwind + iOS presets remain visible in the library.

Brand:
  _group: My Brand
  Primary:
    _name: Primary
    BrandBlue:
      _name: Brand Blue
      _value: "#0066ff"
    BrandNavy:
      _name: Brand Navy
      _value: "#001f54"
  Accents:
    _name: Accents
    _colors:
      - "#ff6b35"
      - "#f7b801"
      - "#00a86b"

# --- Example overrides (uncomment to replace built-ins entirely) ---
#
# _tailwind:
#   _group: Tailwind
#   Red:
#     _name: Red
#     _colors: ["#fee2e2", "#ef4444", "#b91c1c"]
#
# _ios:
#   _group: iOS
#   System:
#     _name: System
#     Red:   { _name: Red,   _value: "#FF3B30" }
#     Blue:  { _name: Blue,  _value: "#007AFF" }
