<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prerender E2E Fixture</title>
  <link rel="manifest" href="/manifest.json">

  <!-- Load Manifest locally.  The loader orchestrates plugin loading then
       loads Alpine itself AFTER plugins are registered.  We intentionally do
       NOT include a <script defer src="alpinejs"> tag here because defer fires
       at DOMContentLoaded, racing against async plugin loads — by the time
       Alpine starts walking the DOM, plugin directives may not yet be
       registered and `$theme`/`$locale` magics will be undefined. -->
  <script src="/scripts/manifest.js"
          data-plugins="components,router,data,icons,localization,themes,markdown,dropdowns"
          data-plugin-base="/scripts"></script>

  <style>
    body { font-family: sans-serif; padding: 1rem; }
    .active { font-weight: bold; color: red; }
    .visible { opacity: 1; }
    .hidden { opacity: 0; pointer-events: none; }
    .open { display: block; }
    .closed { display: none; }
    [x-cloak] { display: none; }
  </style>
</head>
<body>

  <x-header></x-header>

  <!-- Bare unregistered component placeholder.  The components plugin
       leaves this in the DOM as-is (no template registered), so it reaches
       the marker pass as a bare tag with no source attributes.  The marker
       pass must inject the data-pre-rendered attribute with a leading space
       so the tag name stays intact. -->
  <x-not-registered></x-not-registered>

  <!-- Route: home -->
  <section x-route="/">
    <h1 id="home-heading">Home</h1>
    <p>Current locale: <strong id="current-locale" x-text="$locale.current">?</strong></p>

    <!-- x-markdown baked content: should render at prerender time and NOT
         flicker/hide on load.  The plugin has an idempotency guard that
         detects prerendered MPA pages with already-rendered content. -->
    <div id="markdown-container" x-markdown="data/article.md"></div>

    <!-- Second x-markdown using a proper expression reference.  The prerender
         strips x-markdown from elements with baked content AND cleans any
         leftover opacity:0 the plugin set during initial render. -->
    <div id="markdown-dynamic" x-data="{ articlePath: 'data/article.md' }" x-markdown="articlePath + ''"></div>
  </section>

  <!-- Route: about -->
  <section x-route="about">
    <h1 id="about-heading">About</h1>
    <p>About body.</p>
  </section>

  <!-- Explicit data-hydrate island: counter that must work at runtime -->
  <div id="counter-island" data-hydrate x-data="{ count: 0 }">
    <button id="counter-btn" @click="count++">Inc</button>
    <span id="counter-value" x-text="count">0</span>
  </div>

  <!-- Pricing section: x-for over plans, with data-hydrate price that depends
       on a parent-scope variable (`frequency`).  This exercises the exact
       pattern where a loop-variable x-text binding inside a data-hydrate
       element must survive the loop-binding strip so runtime frequency
       toggles update the price text reactively. -->
  <section id="pricing-section" x-data="{ frequency: 'monthly' }">
    <button id="frequency-monthly" @click="frequency = 'monthly'">Monthly</button>
    <button id="frequency-yearly" @click="frequency = 'yearly'">Yearly</button>
    <span id="frequency-current" x-text="frequency">monthly</span>
    <div id="plans">
      <template x-for="plan in $x.content.pricing.plans" :key="plan.name">
        <div class="plan">
          <p class="plan-name" x-text="plan?.name || ''"></p>
          <p class="plan-price" data-hydrate>
            <span x-text="plan?.price?.[frequency] || ''"></span>
          </p>
        </div>
      </template>
    </div>
  </section>

  <!-- Lazy component with diff-binding children and toggle sibling -->
  <x-popup></x-popup>

  <!-- x-show visibility: elements hidden by x-show must stay hidden after hydration.
       Regression test for the bug where the hydration contract emitted "style": null
       for x-show elements, removing their baked display:none and making hidden
       elements visible (e.g. RTL icons appearing alongside LTR icons). -->
  <div id="xshow-test" x-data="{ visible: false }">
    <span id="xshow-visible" x-show="true">Visible</span>
    <span id="xshow-hidden" x-show="false">Hidden</span>
    <button id="xshow-toggle" @click="visible = !visible">Toggle</button>
    <span id="xshow-togglable" x-show="visible">Togglable</span>
  </div>

  <!-- x-for over $x data: template must survive prerender so Alpine can re-render
       the list at runtime (for locale changes, filtering, etc).  Static clones
       must NOT duplicate when Alpine boots. -->
  <div id="xfor-data-test">
    <template x-for="plan in $x.content.pricing.plans" :key="plan.name">
      <span class="data-plan" x-text="plan?.name || ''"></span>
    </template>
  </div>

</body>
</html>
